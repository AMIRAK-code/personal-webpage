<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marble Statue — Background Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --text:   #e8e3da;
      --muted:  rgba(232,227,218,0.3);
      --border: rgba(255,255,255,0.07);
    }

    body {
      background: #050505;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
      height: 600vh;
      cursor: crosshair;
    }

    /* ── Canvas ─────────────────────────────────── */
    #canvas { position: fixed; inset: 0; z-index: 0; }

    /* ── Deep vignette ──────────────────────────── */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(
        ellipse 65% 75% at 50% 48%,
        transparent 30%,
        rgba(2,2,4,0.5) 70%,
        rgba(2,2,4,0.88) 100%
      );
    }

    /* ── Grain ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px; opacity: 0.05; mix-blend-mode: overlay;
    }

    /* ── UI layer ───────────────────────────────── */
    .ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }

    /* Top bar */
    .topbar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 44px;
      border-bottom: 1px solid var(--border);
      opacity: 0; transition: opacity 1.4s ease;
    }
    .tag { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--muted); }

    /* FPS */
    #fps {
      position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
      font-size: 9px; letter-spacing: 0.2em; color: rgba(232,227,218,0.18);
      opacity: 0; transition: opacity 1s ease;
    }

    /* ── Loader ─────────────────────────────────── */
    #loader {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; transition: opacity 1.2s ease;
    }
    .loader-word {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900; font-size: clamp(52px, 8vw, 96px);
      letter-spacing: -0.03em; color: rgba(232,227,218,0.06);
      text-transform: uppercase;
    }
    .loader-line-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      margin-top: 16px;
    }
    .loader-label {
      font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
      color: rgba(232,227,218,0.22);
    }
    .loader-track {
      width: 160px; height: 1px; background: rgba(255,255,255,0.06); position: relative; overflow: hidden;
    }
    .loader-fill {
      position: absolute; top: 0; left: 0; height: 100%;
      background: rgba(232,227,218,0.35); width: 0%; transition: width 0.3s ease;
    }
    /* Animated shimmer on loader track */
    .loader-shimmer {
      position: absolute; top: 0; left: -60px; width: 60px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(232,227,218,0.5), transparent);
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer { to { left: 160px; } }

    /* ── Source badge ───────────────────────────── */
    #sourceBadge {
      position: absolute; top: 84px; right: 44px;
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(232,227,218,0.2);
      border: 1px solid rgba(255,255,255,0.06); padding: 7px 14px;
      opacity: 0; transition: opacity 1s ease 0.5s;
    }

    /* ── Bottom labels ──────────────────────────── */
    .bottom-left {
      position: absolute; bottom: 44px; left: 44px;
      opacity: 0; transform: translateY(12px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .bottom-right {
      position: absolute; bottom: 44px; right: 44px; text-align: right;
      opacity: 0; transform: translateY(12px);
      transition: opacity 1.2s ease 0.15s, transform 1.2s ease 0.15s;
    }
    .label-num { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .label-name {
      font-family: 'Space Grotesk', sans-serif; font-weight: 900;
      font-size: clamp(32px, 4.5vw, 60px); letter-spacing: -0.02em; line-height: 0.88;
    }
    .label-sub { font-size: 10px; color: var(--muted); margin-top: 10px; line-height: 1.7; }

    /* ── Scroll hint ────────────────────────────── */
    .scroll-hint {
      position: absolute; bottom: 108px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; transition: opacity 1.4s ease;
    }
    .scroll-hint span { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); }
    .scroll-hint-line { width: 1px; height: 44px; background: linear-gradient(to bottom, var(--muted), transparent); }

    /* ── Orbit HUD ──────────────────────────────── */
    .orbit-hud {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      opacity: 0; transition: opacity 0.8s ease;
    }
    .orbit-hud svg { width: 48px; height: 48px; }
    .orbit-deg { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); }

    /* ── Progress bar ───────────────────────────── */
    .progress { position: absolute; bottom: 0; left: 0; height: 1px; background: rgba(232,227,218,0.12); width: 0%; }

    /* ── Fade-in util ───────────────────────────── */
    .revealed   { opacity: 1 !important; transform: translateY(0) !important; }
    .revealed-t { opacity: 1 !important; }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>
  <div class="vignette"></div>

  <div class="ui">
    <div class="topbar" id="topbar">
      <span class="tag">Amir Akbari — Statue Demo</span>
      <span class="tag" id="fps">— fps</span>
    </div>

    <div id="sourceBadge">— loading</div>

    <!-- Loader -->
    <div id="loader">
      <div class="loader-word">Marble</div>
      <div class="loader-line-wrap">
        <div class="loader-label">Loading statue</div>
        <div class="loader-track">
          <div class="loader-fill" id="loaderFill"></div>
          <div class="loader-shimmer"></div>
        </div>
      </div>
    </div>

    <!-- Labels -->
    <div class="bottom-left" id="labelLeft">
      <div class="label-num">Background Demo</div>
      <div class="label-name">Marble<br>Statue</div>
      <div class="label-sub">MeshPhysicalMaterial<br>Dramatic 4-light museum rig</div>
    </div>
    <div class="bottom-right" id="labelRight">
      <div class="label-num">Interaction</div>
      <div class="label-name">Scroll<br>Orbit</div>
      <div class="label-sub">Camera orbits 210° on scroll<br>Mouse drives parallax tilt</div>
    </div>

    <!-- Scroll hint -->
    <div class="scroll-hint" id="scrollHint">
      <span>scroll to orbit</span>
      <div class="scroll-hint-line"></div>
    </div>

    <!-- Orbit HUD (replaces scroll hint after scroll begins) -->
    <div class="orbit-hud" id="orbitHud">
      <svg viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="21" stroke="rgba(232,227,218,0.08)" stroke-width="1"/>
        <circle id="orbitArc" cx="24" cy="24" r="21"
          stroke="rgba(232,227,218,0.45)" stroke-width="1" stroke-linecap="round"
          stroke-dasharray="131.95" stroke-dashoffset="131.95"
          transform="rotate(-90 24 24)"/>
        <!-- Center dot -->
        <circle cx="24" cy="24" r="1.5" fill="rgba(232,227,218,0.3)"/>
      </svg>
      <div class="orbit-deg" id="orbitDeg">0°</div>
    </div>

    <div class="progress" id="progress"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three":         "https://unpkg.com/three@0.171.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.171.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE     from 'three'
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js'

    // ── Renderer ──────────────────────────────────────────────
    const canvas   = document.getElementById('canvas')
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true })
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2))
    renderer.setSize(window.innerWidth, window.innerHeight)
    renderer.setClearColor(0x050505, 1)
    renderer.toneMapping         = THREE.ACESFilmicToneMapping
    renderer.toneMappingExposure = 1.6
    renderer.shadowMap.enabled   = true
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap

    // ── Scene ─────────────────────────────────────────────────
    const scene = new THREE.Scene()
    scene.fog   = new THREE.FogExp2(0x050505, 0.038)

    // ── Camera ────────────────────────────────────────────────
    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 120)
    // Start pulled back — will zoom in on reveal
    camera.position.set(0, 0.8, 10)
    camera.lookAt(0, 2.2, 0)

    // ── Marble texture ────────────────────────────────────────
    function createMarbleTexture(size = 1024) {
      const c = document.createElement('canvas')
      c.width = c.height = size
      const ctx = c.getContext('2d')

      // Warm, slightly varied base
      const base = ctx.createLinearGradient(0, 0, size, size * 0.7)
      base.addColorStop(0,   '#f7f2ec')
      base.addColorStop(0.5, '#f3ede7')
      base.addColorStop(1,   '#ece7e0')
      ctx.fillStyle = base
      ctx.fillRect(0, 0, size, size)

      // Primary veins — Bézier curves, gray-brown
      for (let i = 0; i < 28; i++) {
        const x0 = Math.random() * size, y0 = Math.random() * size
        const x1 = Math.random() * size, y1 = Math.random() * size
        const cx1 = (x0+x1)/2 + (Math.random()-.5)*size*.7
        const cy1 = (y0+y1)/2 + (Math.random()-.5)*size*.5
        const lw  = 0.4 + Math.random() * 2.2
        const a   = 0.05 + Math.random() * 0.13
        ctx.beginPath()
        ctx.moveTo(x0, y0)
        ctx.quadraticCurveTo(cx1, cy1, x1, y1)
        ctx.strokeStyle = `rgba(105,92,76,${a})`
        ctx.lineWidth = lw
        ctx.lineCap   = 'round'
        ctx.stroke()
      }

      // Fine micro-veins
      for (let i = 0; i < 70; i++) {
        const x0 = Math.random() * size, y0 = Math.random() * size
        const x1 = x0 + (Math.random()-.5)*size*.5
        const y1 = y0 + (Math.random()-.5)*size*.5
        const cx1 = (x0+x1)/2 + (Math.random()-.5)*80
        const cy1 = (y0+y1)/2 + (Math.random()-.5)*80
        ctx.beginPath()
        ctx.moveTo(x0, y0)
        ctx.quadraticCurveTo(cx1, cy1, x1, y1)
        ctx.strokeStyle = `rgba(155,140,122,${0.02 + Math.random()*0.07})`
        ctx.lineWidth   = 0.15 + Math.random() * 0.6
        ctx.stroke()
      }

      // Natural colour blobs (warm + cool pockets)
      for (let i = 0; i < 18; i++) {
        const x = Math.random() * size, y = Math.random() * size
        const r = 50 + Math.random() * 140
        const g = ctx.createRadialGradient(x, y, 5, x, y, r)
        const warm = Math.random() > 0.45
        g.addColorStop(0, warm
          ? `rgba(225,210,185,${0.04+Math.random()*0.07})`
          : `rgba(185,192,205,${0.02+Math.random()*0.05})`)
        g.addColorStop(1, 'rgba(0,0,0,0)')
        ctx.fillStyle = g
        ctx.fillRect(0, 0, size, size)
      }

      return new THREE.CanvasTexture(c)
    }

    // ── Marble material ───────────────────────────────────────
    const marbleMat = new THREE.MeshPhysicalMaterial({
      color:              new THREE.Color(0.97, 0.94, 0.90),
      roughness:          0.32,
      metalness:          0.0,
      clearcoat:          0.3,
      clearcoatRoughness: 0.25,
      reflectivity:       0.4,
      map:                createMarbleTexture(),
      envMapIntensity:    0.5,
    })

    // ── Ground plane ──────────────────────────────────────────
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.95, metalness: 0 })
    )
    ground.rotation.x = -Math.PI / 2
    ground.position.y = -2.5
    ground.receiveShadow = true
    scene.add(ground)

    // ── Light pool on ground (soft spotlight circle) ──────────
    const poolCvs = document.createElement('canvas')
    poolCvs.width = poolCvs.height = 256
    const pc  = poolCvs.getContext('2d')
    const pg  = pc.createRadialGradient(128,128,0, 128,128,128)
    pg.addColorStop(0,   'rgba(255,245,215,0.30)')
    pg.addColorStop(0.45,'rgba(255,240,200,0.10)')
    pg.addColorStop(1,   'rgba(0,0,0,0)')
    pc.fillStyle = pg; pc.fillRect(0,0,256,256)
    const pool = new THREE.Mesh(
      new THREE.CircleGeometry(3.0, 72),
      new THREE.MeshBasicMaterial({
        map: new THREE.CanvasTexture(poolCvs),
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
      })
    )
    pool.rotation.x = -Math.PI / 2
    pool.position.y = -2.46
    scene.add(pool)

    // ── God ray — volumetric light cone from above ────────────
    const rayCvs = document.createElement('canvas')
    rayCvs.width = rayCvs.height = 128
    const rc  = rayCvs.getContext('2d')
    const rg  = rc.createRadialGradient(64,64,0, 64,64,64)
    rg.addColorStop(0,   'rgba(255,248,220,1)')
    rg.addColorStop(0.5, 'rgba(255,248,220,0.5)')
    rg.addColorStop(1,   'rgba(0,0,0,0)')
    rc.fillStyle = rg; rc.fillRect(0,0,128,128)
    const rayGeo = new THREE.CylinderGeometry(0.12, 2.0, 11, 48, 1, true)
    const rayMat = new THREE.MeshBasicMaterial({
      map: new THREE.CanvasTexture(rayCvs),
      transparent: true, opacity: 0.055,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    })
    const godRay = new THREE.Mesh(rayGeo, rayMat)
    godRay.position.set(0.2, 6.2, 0)   // centre between spotlight (y≈12) and statue (y≈1)
    scene.add(godRay)

    // ── Lights — ALL start at 0, animated in on reveal ───────
    const ambLight = new THREE.AmbientLight(0x18130e, 0)
    scene.add(ambLight)

    // Key — strong warm, upper-left
    const keyLight = new THREE.DirectionalLight(0xfff5e8, 0)
    keyLight.position.set(-3.5, 9, 5)
    keyLight.castShadow           = true
    keyLight.shadow.mapSize.set(2048, 2048)
    keyLight.shadow.camera.near   = 0.5
    keyLight.shadow.camera.far    = 32
    keyLight.shadow.camera.left   = -7
    keyLight.shadow.camera.right  = 7
    keyLight.shadow.camera.top    = 9
    keyLight.shadow.camera.bottom = -5
    keyLight.shadow.bias          = -0.0008
    scene.add(keyLight)

    // Cool blue fill — right side, very soft
    const fillLight = new THREE.DirectionalLight(0xa8c4ff, 0)
    fillLight.position.set(7, 2, -2)
    scene.add(fillLight)

    // Warm amber rim — from behind
    const rimLight = new THREE.PointLight(0xff9050, 0, 22)
    rimLight.position.set(1, 6, -7)
    scene.add(rimLight)

    // Pure white top spot — tight beam from above
    const topSpot = new THREE.SpotLight(0xffffff, 0, 28, Math.PI / 7, 0.35, 1.8)
    topSpot.position.set(0.3, 13, 0.5)
    topSpot.target.position.set(0, 1.5, 0)
    scene.add(topSpot, topSpot.target)

    // Target intensities
    const T = { amb: 3.0, key: 6.0, fill: 1.3, rim: 3.0, top: 3.5 }

    // ── Glowing dust particles ────────────────────────────────
    const spCvs = document.createElement('canvas')
    spCvs.width = spCvs.height = 64
    const sc = spCvs.getContext('2d')
    const sg = sc.createRadialGradient(32,32,0, 32,32,32)
    sg.addColorStop(0,   'rgba(255,248,225,1)')
    sg.addColorStop(0.28,'rgba(255,248,225,0.55)')
    sg.addColorStop(0.6, 'rgba(255,248,225,0.12)')
    sg.addColorStop(1,   'rgba(0,0,0,0)')
    sc.fillStyle = sg; sc.fillRect(0,0,64,64)
    const spriteTex = new THREE.CanvasTexture(spCvs)

    const DUST = 300
    const dustArr = new Float32Array(DUST * 3)
    const dustSpeeds = new Float32Array(DUST)
    for (let i = 0; i < DUST; i++) {
      // Concentrate particles in the light cone (narrow at top, wide at base)
      const t    = Math.random()         // 0=top, 1=bottom of cone
      const coneR = 0.15 + t * 2.0      // cone radius at this height
      const ang  = Math.random() * Math.PI * 2
      const rad  = Math.random() * coneR
      dustArr[i*3]     = Math.cos(ang) * rad
      dustArr[i*3 + 1] = 11.5 - t * 13  // y from +11.5 (top) down to -1.5
      dustArr[i*3 + 2] = Math.sin(ang) * rad
      dustSpeeds[i]    = 0.002 + Math.random() * 0.004
    }
    const dustGeo = new THREE.BufferGeometry()
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustArr, 3))
    const dustMat = new THREE.PointsMaterial({
      size: 0.065, sizeAttenuation: true, map: spriteTex,
      transparent: true, blending: THREE.AdditiveBlending,
      depthWrite: false, opacity: 0,
    })
    scene.add(new THREE.Points(dustGeo, dustMat))

    // ── Model loading ─────────────────────────────────────────
    const loader = new GLTFLoader()
    const SOURCES = [
      { url: 'https://dl.polyhaven.org/file/ph-assets/Models/gltf/2k/marble_bust_01/marble_bust_01_2k.gltf', label: 'Poly Haven CC0 · marble_bust_01' },
      { url: 'https://raw.githubusercontent.com/playcanvas/engine/main/examples/assets/models/statue.glb',    label: 'PlayCanvas MIT · statue.glb'  },
    ]
    let modelLoaded = false
    let revealing   = false
    let labelsShown = false
    let revealPhase = 0   // 0–1

    function tryLoad(idx) {
      if (idx >= SOURCES.length) { buildFallbackBust(); onReady('Procedural fallback'); return }
      loader.load(
        SOURCES[idx].url,
        (gltf) => {
          if (modelLoaded) return; modelLoaded = true
          const model = gltf.scene

          // Scale + centre
          const box = new THREE.Box3().setFromObject(model)
          const sz  = new THREE.Vector3(); box.getSize(sz)
          const ctr = new THREE.Vector3(); box.getCenter(ctr)
          const s   = 5.2 / Math.max(sz.x, sz.y, sz.z)
          model.scale.setScalar(s)
          model.position.sub(ctr.multiplyScalar(s))
          model.position.y += sz.y * s * 0.5 - 2.1

          model.traverse(c => {
            if (c.isMesh) { c.material = marbleMat; c.castShadow = c.receiveShadow = true }
          })
          scene.add(model)
          onReady(SOURCES[idx].label)
        },
        (xhr) => {
          if (xhr.total > 0)
            document.getElementById('loaderFill').style.width = (xhr.loaded/xhr.total*100)+'%'
        },
        () => { tryLoad(idx + 1) }
      )
    }

    function onReady(sourceLabel) {
      // Fade loader out
      const loaderEl = document.getElementById('loader')
      loaderEl.style.opacity = '0'
      setTimeout(() => loaderEl.style.display = 'none', 1200)

      // Show source badge
      const badge = document.getElementById('sourceBadge')
      badge.textContent = sourceLabel
      badge.classList.add('revealed-t')

      // Show topbar + fps
      document.getElementById('topbar').classList.add('revealed-t')
      document.getElementById('fps').classList.add('revealed-t')

      revealing   = true
      revealPhase = 0
    }

    tryLoad(0)

    // ── Procedural bust fallback ──────────────────────────────
    function buildFallbackBust() {
      const g = new THREE.Group()
      const add = (geo, px, py, pz, sx=1, sy=1, sz=1) => {
        const m = new THREE.Mesh(geo, marbleMat)
        m.position.set(px, py, pz)
        m.scale.set(sx, sy, sz)
        m.castShadow = m.receiveShadow = true
        g.add(m)
      }
      // Pedestal
      add(new THREE.BoxGeometry(2.2, 0.35, 2.2),              0, 0.18, 0)
      add(new THREE.CylinderGeometry(0.72, 0.82, 2.9, 12),    0, 1.82, 0)
      add(new THREE.BoxGeometry(1.75, 0.22, 1.75),             0, 3.3, 0)
      // Body
      add(new THREE.CylinderGeometry(0.82, 0.52, 1.9, 32),    0, 4.32, 0)
      add(new THREE.CylinderGeometry(0.26, 0.36, 0.75, 32),   0, 5.56, 0)
      // Head
      const hg = new THREE.SphereGeometry(0.63, 64, 64)
      hg.applyMatrix4(new THREE.Matrix4().makeScale(1, 1.15, 0.93))
      add(hg, 0, 6.34, 0)
      // Brow
      add(new THREE.SphereGeometry(0.07, 16, 16), -0.21, 6.50, 0.51, 1.9, 0.48, 1)
      add(new THREE.SphereGeometry(0.07, 16, 16),  0.21, 6.50, 0.51, 1.9, 0.48, 1)
      // Nose
      add(new THREE.CylinderGeometry(0.034, 0.056, 0.27, 12), 0, 6.22, 0.55)
      g.position.y = -3.95
      scene.add(g)
    }

    // ── Shared state ──────────────────────────────────────────
    let scroll = 0, targetScroll = 0
    let mouseX = 0, mouseY       = 0
    let tMX    = 0, tMY          = 0

    const ORBIT_R     = 7.2
    const CAM_Y_START = 0.8
    const CAM_Y_END   = -0.2
    const LOOK        = new THREE.Vector3(0, 2.2, 0)
    const LOOK_LOW    = new THREE.Vector3(0, 1.4, 0) // look slightly lower as we orbit
    let camX = 0, camY = CAM_Y_START, camZ = ORBIT_R + 2.5  // start pulled back
    let tCX  = 0, tCY  = CAM_Y_START, tCZ  = camZ

    window.addEventListener('scroll', () => {
      const max = document.documentElement.scrollHeight - window.innerHeight
      targetScroll = max > 0 ? window.scrollY / max : 0
      document.getElementById('progress').style.width = (targetScroll * 100) + '%'

      // Swap scroll hint for orbit HUD
      if (targetScroll > 0.02) {
        document.getElementById('scrollHint').style.opacity   = '0'
        document.getElementById('orbitHud').style.opacity     = '1'
      }
    })
    window.addEventListener('mousemove', e => {
      tMX = (e.clientX / window.innerWidth  - 0.5) * 2
      tMY = (e.clientY / window.innerHeight - 0.5) * 2
    })
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight
      camera.updateProjectionMatrix()
      renderer.setSize(window.innerWidth, window.innerHeight)
    })

    // ── FPS ───────────────────────────────────────────────────
    let frames = 0, lastFPS = performance.now()
    const fpsEl = document.getElementById('fps')

    // ── Animate ───────────────────────────────────────────────
    const clock = new THREE.Clock()
    const ARC_C = 131.95  // circumference of r=21 circle

    function animate() {
      requestAnimationFrame(animate)
      const t  = clock.getElapsedTime()
      const dt = clock.getDelta ? 0.016 : 0.016

      // FPS
      frames++
      const now = performance.now()
      if (now - lastFPS >= 1000) {
        fpsEl.textContent = frames + ' fps'; frames = 0; lastFPS = now
      }

      // Lerp input
      scroll  += (targetScroll - scroll)  * 0.042
      mouseX  += (tMX - mouseX)           * 0.055
      mouseY  += (tMY - mouseY)           * 0.055

      // Ease scroll for orbit
      const e = scroll < 0.5
        ? 2*scroll*scroll
        : 1 - Math.pow(-2*scroll + 2, 2) / 2

      // ── Light reveal (theatrical dark-to-light) ─────────────
      if (revealing) {
        revealPhase += (1 - revealPhase) * 0.009   // exponential approach
        const rp = revealPhase

        ambLight.intensity  = rp * T.amb
        keyLight.intensity  = rp * T.key
        fillLight.intensity = rp * T.fill
        rimLight.intensity  = rp * T.rim
        topSpot.intensity   = rp * T.top
        dustMat.opacity     = rp * 0.65
        rayMat.opacity      = rp * 0.055

        // Staged label reveals
        if (rp > 0.42 && !labelsShown) {
          labelsShown = true
          document.getElementById('labelLeft').classList.add('revealed')
          document.getElementById('labelRight').classList.add('revealed')
        }
        if (rp > 0.65) {
          document.getElementById('scrollHint').style.opacity = String(Math.min(1, (rp - 0.65) * 4))
        }

        // Zoom in during reveal: pull camera from z=9.7 → 7.2
        const zoomR = ORBIT_R + (1 - Math.min(1, revealPhase * 1.4)) * 2.5
        tCZ = zoomR
      }

      // ── Camera orbit ────────────────────────────────────────
      const angle = e * Math.PI * 1.167    // 0 → 210°
      const orbitR = revealing ? tCZ : ORBIT_R

      tCX = Math.sin(angle) * orbitR + mouseX * 0.28
      if (!revealing) tCZ = Math.cos(angle) * orbitR
      tCY = CAM_Y_START + e * (CAM_Y_END - CAM_Y_START) + mouseY * -0.22

      const smooth = revealing ? 0.025 : 0.05
      camX += (tCX - camX) * smooth
      camY += (tCY - camY) * smooth
      camZ += (tCZ - camZ) * smooth

      // Subtle breathing (very slow, small)
      const bx = Math.sin(t * 0.33) * 0.018
      const by = Math.sin(t * 0.47) * 0.012

      camera.position.set(camX + bx, camY + by, camZ)

      // Interpolate look target slightly lower as camera descends
      const lookY = 2.2 + e * (1.4 - 2.2)
      camera.lookAt(0, lookY, 0)

      // ── Orbit arc + degree label ────────────────────────────
      const deg = Math.round(e * 210)
      document.getElementById('orbitDeg').textContent = deg + '°'
      document.getElementById('orbitArc').setAttribute(
        'stroke-dashoffset',
        String(ARC_C * (1 - e * 0.583))
      )

      // ── Rim light gentle drift ──────────────────────────────
      rimLight.position.x = 1.0 + Math.sin(t * 0.28) * 0.9
      rimLight.position.z = -7.0 + Math.cos(t * 0.19) * 0.7
      rimLight.intensity  = revealing
        ? revealPhase * T.rim
        : T.rim * (0.88 + Math.sin(t * 0.6) * 0.12)

      // ── God ray subtle flicker ──────────────────────────────
      rayMat.opacity = (revealing ? revealPhase : 1) * (0.048 + Math.sin(t * 1.3) * 0.008)

      // ── Pool gentle pulse ───────────────────────────────────
      pool.material.opacity = (revealing ? revealPhase : 1) * (0.72 + Math.sin(t * 0.55) * 0.1)

      // ── Dust drift upward inside cone ───────────────────────
      const dp = dustGeo.attributes.position.array
      for (let i = 0; i < DUST; i++) {
        dp[i*3 + 1] += dustSpeeds[i]          // drift upward through spotlight beam
        // When particle exits top of cone, reset at bottom
        if (dp[i*3 + 1] > 12) {
          const t2   = Math.random()
          const cR   = 0.15 + t2 * 2.0
          const ang2 = Math.random() * Math.PI * 2
          dp[i*3]     = Math.cos(ang2) * Math.random() * cR
          dp[i*3+1]   = -1.5
          dp[i*3+2]   = Math.sin(ang2) * Math.random() * cR
        }
      }
      dustGeo.attributes.position.needsUpdate = true

      renderer.render(scene, camera)
    }

    animate()
  </script>
</body>
</html>
